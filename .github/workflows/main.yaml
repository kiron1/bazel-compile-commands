# GitHub Workflows file

name: main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version `x.y.z` (without leading `v`)"
        type: string
        required: true

jobs:
  test:
    name: Build and test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        build:
          - linux
          # - windows
        include:
          - build: linux
            os: ubuntu-24.04
            config: gnu
          # - build: windows
          #  os: windows-2019
          #  config: cl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Bazel cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel_build_cache
          key: ${{ runner.os }}-bazel-test-${{ hashFiles('MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-test-
      - name: Run bazel test
        run: bazel test --config=${{ matrix.config }} --config=ci --disk_cache=~/.cache/bazel_build_cache //...
      - name: Cache cleanup
        run: ./tools/disk-cache-collect-garbage ~/.cache/bazel_build_cache

  buildpkg:
    name: Build Release Asset
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      matrix:
        include:
          - build: noble-x86_64
            os: ubuntu-24.04
            config: gnu
            platform: "//:linux_x86_64"
            suffix: noble_amd64
            type: deb
          - build: noble-arm64
            os: ubuntu-24.04
            config: gnu
            platform: "//:linux_aarch64"
            suffix: noble_arm64
            type: deb
          - build: linux-amd64
            os: ubuntu-24.04
            config: gnu
            platform: "//:linux_x86_64"
            suffix: linux_amd64
            type: zip
          - build: linux-arm64
            os: ubuntu-24.04
            config: gnu
            platform: "//:linux_aarch64"
            suffix: linux_arm64
            type: zip
          - build: macos-universal
            os: macos-latest
            platform: "//:apple-darwin-aarch64"
            config: gnu
            suffix: macos_universal
            type: zip
          # - build: windows
          #   os: windows-2019
          #   config: cl
          #   suffix: windows_amd64
          #   type: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Bazel cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel_build_cache
          key: ${{ matrix.os }}-bazel-buildpkg-${{ hashFiles('MODULE.bazel') }}
          restore-keys: |
            ${{ matrix.os }}-bazel-buildpkg-
      - name: Generate Package Name
        run: |
         echo PKGFILE="bazel-compile-commands_${{ github.event.inputs.version || 0 }}-${{ matrix.suffix }}.${{ matrix.type}}" >> $GITHUB_ENV
      - name: Build Release Package
        run: |
          bazel run \
          --platforms "${{ matrix.platform }}" \
          --config=${{ matrix.config }} \
          --config=ci --config=release \
          --//:version=${{ github.event.inputs.version || 0 }} \
          --disk_cache=~/.cache/bazel_build_cache \
          //:copy_${{ matrix.type }} -- "${PKGFILE}"
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-bazel-${{ matrix.build }}
          path: ${{ env.PKGFILE }}
          if-no-files-found: error
      - name: Cache cleanup
        run: ./tools/disk-cache-collect-garbage ~/.cache/bazel_build_cache

  self_test:
    name: Self test
    runs-on: ubuntu-24.04
    needs: buildpkg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Bazel cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel_build_cache
          key: bazel-selftest-${{ hashFiles('MODUE.bazel') }}
          restore-keys: |
            bazel-selftest-
      - name: Run bazel to generate worktree
        run: bazel build --config=gnu --config=ci //...
      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-bazel-noble-x86_64
      - name: Install
        run: |
          sudo dpkg --install pkg-bazel-noble-x86_64/bazel-compile-commands_*.deb
      - name: Create compile-commands.json
        run: |
          /usr/bin/bazel-compile-commands -v -a --config=gnu --replace=-fno-canonical-system-headers= //...
      - name: Run clang-tidy
        run: |
          clang-tidy -p "$(pwd)" $(find . -type f -name '*.cpp')

  mkrelease:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - buildpkg
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          merge-multiple: true
      # - name: Create Source Archive
      #   run: |
      #     ./tools/archive.sh
      #   env:
      #     TAG: v${{ github.event.inputs.version }}
      - name: Create Release
        run: |
          gh release create v${{ github.event.inputs.version }} --generate-notes *.deb *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  format_check:
    name: Style check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1.9.0
        with:
          version: "15.0.6"
      - name: clang-format --version
        run: clang-format --version
      - name: Style check
        run: ./tools/clang-format --dry-run -Werror

  # The success job is here to consolidate the total success/failure state of
  # all other jobs. This job is then included in the GitHub branch protection
  # rule which prevents merges unless all other jobs are passing. This makes
  # it easier to manage the list of jobs via this yaml file and to prevent
  # accidentally adding new jobs without also updating the branch protections.
  success:
    name: Success gate
    if: always()
    needs:
      - self_test
      - format_check
    runs-on: ubuntu-24.04
    steps:
      - name: Check
        run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
